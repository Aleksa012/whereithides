<!doctype html>
<html lang="en">
  <head>
    <link
      href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" type="text/css" href="splash.css" />
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, width=device-width, height=device-height, user-scalable=0"
    />
    <title>devvit</title>
  </head>
  <body class="app">
    <img class="knight" src="../../public/knight_bg.png" alt="knight" />
    <div class="content">
      <h1 class="title" id="title"></h1>
      <p class="description" id="description"></p>
      <p class="description">1. Move character by tapping on screen</p>
      <p class="description">2. Pick up tools to clear obstacles</p>
      <p class="description">
        3. Dig to find a map by tapping the square below you
      </p>
      <p class="description">4. Find the winning square and stand on it!</p>
      <p class="level-id" id="level-id"></p>
      <button class="start-button" id="start-button">Start</button>
      <button class="start-button" id="lb-button">Leaderboard</button>
    </div>
    <script type="module" src="splash.ts" defer></script>
  </body>
</html>
